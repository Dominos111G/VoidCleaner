# ============================================================
# Project Settings
# ============================================================
group=pl.szczerbal.voidcleaner
version=0.1.1

# ============================================================
# Build Settings
# ============================================================
# Default Minecraft version for builds (override with -PmcVersion=X.X.X)
mcVersion=1.21

# Build shadow JAR with all dependencies
shadow=false

# ============================================================
# Gradle Optimization
# ============================================================
org.gradle.configuration-cache=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.jvmargs=-Xmx2g -XX:+UseG1GC

# ============================================================
# Build Options
# ============================================================
# Skip tests during build
org.gradle.testsuites.enabled=false
